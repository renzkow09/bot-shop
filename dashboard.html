<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 450px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0b0f19; color: white; margin-bottom: 15px; width: 80%; text-align: center; font-size: 18px; letter-spacing: 5px; }
        button { background: #38bdf8; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 80%; transition: 0.2s; font-size: 16px; }
        button:hover { background: #0284c7; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: #334155; padding: 20px; border-radius: 8px; border-left: 4px solid #38bdf8; text-align: left; }
        .stat-val { font-size: 28px; font-weight: bold; color: #38bdf8; margin-top: 5px; }
        #errorMsg { color: #ef4444; display: none; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app" class="box">
        <h2>⏳ Connexion au serveur...</h2>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const res = await fetch('/api/data');
                if (res.status === 401) {
                    showLoginScreen();
                } else if (res.ok) {
                    const data = await res.json();
                    showDashboardScreen(data);
                }
            } catch (err) {
                document.getElementById('app').innerHTML = "<h2 style='color:#ef4444;'>❌ Le serveur est hors ligne</h2>";
            }
        }

        function showLoginScreen() {
            document.getElementById('app').innerHTML = `
                <h2>🔒 Accès Restreint</h2>
                <p style="color:#94a3b8; font-size:14px; margin-bottom:20px;">Veuillez entrer votre code PIN</p>
                <input type="password" id="pinInput" placeholder="••••" maxlength="4">
                <br>
                <button onclick="attemptLogin()">Déverrouiller</button>
                <div id="errorMsg">❌ Code PIN incorrect</div>
            `;
            
            // Permet d'appuyer sur Entrée pour valider
            document.getElementById('pinInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') attemptLogin();
            });
        }

        function showDashboardScreen(data) {
            document.getElementById('app').innerHTML = `
                <h2>⚙️ Nexus Dashboard</h2>
                <p style="color:#94a3b8; font-size:12px;">Mise à jour en temps réel</p>
                
                <div class="grid">
                    <div class="stat-card">
                        <div style="font-size:14px; color:#cbd5e1;">Revenus Totaux</div>
                        <div class="stat-val">€${data.revenue.toFixed(2)}</div>
                    </div>
                    <div class="stat-card" style="border-color: #10b981;">
                        <div style="font-size:14px; color:#cbd5e1;">Ventes Réalisées</div>
                        <div class="stat-val" style="color: #10b981;">${data.sales}</div>
                    </div>
                </div>
            `;
        }

        async function attemptLogin() {
            const pin = document.getElementById('pinInput').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin: pin })
            });
            
            if (res.ok) {
                loadDashboard();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // Démarrage initial
        loadDashboard();
        
        // Rafraîchissement automatique toutes les 5 secondes
        setInterval(() => {
            // Ne rafraîchit que si on n'est pas sur l'écran de login
            if (!document.getElementById('pinInput')) {
                loadDashboard();
            }
        }, 5000);
    </script>

</body>
</html>
